events {}
http {
    include /etc/nginx/mime.types;
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass https://ibm-sales-intelligence.23ij0n2ztu5p.ca-tor.codeengine.appdomain.cloud/api/;
            proxy_http_version 1.1;
            proxy_set_header Host ibm-sales-intelligence.23ij0n2ztu5p.ca-tor.codeengine.appdomain.cloud;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
