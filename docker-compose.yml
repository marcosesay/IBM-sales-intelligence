services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      WATSONX_API_KEY: ${WATSONX_API_KEY:-}
      WATSONX_PROJECT_ID: ${WATSONX_PROJECT_ID:-}
      WATSONX_URL: ${WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      AI_INTEGRATIONS_IBM_WATSONX_API_KEY: ${AI_INTEGRATIONS_IBM_WATSONX_API_KEY:-}
      AI_INTEGRATIONS_IBM_WATSONX_PROJECT_ID: ${AI_INTEGRATIONS_IBM_WATSONX_PROJECT_ID:-}
      AI_INTEGRATIONS_IBM_WATSONX_URL: ${AI_INTEGRATIONS_IBM_WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
