services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: "http://backend:8080"
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped
